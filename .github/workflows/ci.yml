name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  checks: write
  pull-requests: write

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '16'
  # Placeholder: create a repository secret named SNYK_TOKEN in GitHub.
  # GitHub path: Settings -> Secrets and variables -> Actions -> New repository secret.
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

jobs:
  backend:
    name: Backend test, quality check, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./SpringCRUD/gradlew

      - name: Run backend unit tests
        run: ./SpringCRUD/gradlew -p ./SpringCRUD test

      - name: Publish backend test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: SpringCRUD/build/test-results/test/TEST*.xml

      - name: Run backend static analysis and coverage checks
        run: ./SpringCRUD/gradlew -p ./SpringCRUD check

      - name: Build backend artifact
        run: ./SpringCRUD/gradlew -p ./SpringCRUD build

      - name: Upload backend test and quality reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-reports
          path: |
            SpringCRUD/build/reports
            SpringCRUD/build/test-results

  frontend:
    name: Frontend Karma test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: AngularCRUD/package-lock.json

      - name: Install frontend dependencies
        working-directory: AngularCRUD
        run: npm ci

      - name: Run frontend Karma tests
        working-directory: AngularCRUD
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build frontend
        working-directory: AngularCRUD
        run: npm run build

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: AngularCRUD/coverage
          if-no-files-found: ignore

  security:
    name: Snyk dependency scan
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v6
        if: env.SNYK_TOKEN != ''
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: AngularCRUD/package-lock.json

      - name: Skip Snyk scan when token is not configured
        if: env.SNYK_TOKEN == ''
        run: echo "SNYK_TOKEN is not configured. Add it as a repository secret to enable Snyk dependency scanning."

      - name: Make Gradle wrapper executable
        if: env.SNYK_TOKEN != ''
        run: chmod +x ./SpringCRUD/gradlew

      - name: Install Snyk CLI
        if: env.SNYK_TOKEN != ''
        run: npm install -g snyk

      - name: Scan backend dependencies with Snyk
        if: env.SNYK_TOKEN != ''
        continue-on-error: true
        working-directory: SpringCRUD
        run: snyk test --severity-threshold=high

      - name: Install frontend dependencies
        if: env.SNYK_TOKEN != ''
        working-directory: AngularCRUD
        run: npm ci

      - name: Scan frontend dependencies with Snyk
        if: env.SNYK_TOKEN != ''
        continue-on-error: true
        working-directory: AngularCRUD
        run: snyk test --severity-threshold=high

  docker:
    name: Docker build and GHCR publish
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: github.event_name == 'push'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Prepare lowercase GHCR image names
        run: |
          echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend Docker image
        run: |
          docker build \
            --tag "$IMAGE_PREFIX/spring-service:latest" \
            --tag "$IMAGE_PREFIX/spring-service:${{ github.sha }}" \
            ./SpringCRUD

      - name: Build frontend Docker image
        run: |
          docker build \
            --tag "$IMAGE_PREFIX/angular-service:latest" \
            --tag "$IMAGE_PREFIX/angular-service:${{ github.sha }}" \
            ./AngularCRUD

      - name: Push backend Docker image
        run: |
          docker push "$IMAGE_PREFIX/spring-service:latest"
          docker push "$IMAGE_PREFIX/spring-service:${{ github.sha }}"

      - name: Push frontend Docker image
        run: |
          docker push "$IMAGE_PREFIX/angular-service:latest"
          docker push "$IMAGE_PREFIX/angular-service:${{ github.sha }}"
